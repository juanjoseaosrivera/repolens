name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint, type-check, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: repolens
          POSTGRES_PASSWORD: repolens
          POSTGRES_DB: repolens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U repolens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy
        run: uv run mypy src/repolens/

      - name: Pytest
        run: uv run pytest tests/unit/ -v --tb=short
        env:
          REPOLENS_DATABASE_URL: postgresql+psycopg://repolens:repolens@localhost:5432/repolens

  frontend:
    name: Frontend — lint, type-check, test, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npx ng build

      - name: Test
        run: npx ng test --watch=false --browsers=ChromeHeadless

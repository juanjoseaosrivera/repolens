repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        files: ^backend/src/
        args: [--strict, --config-file=backend/pyproject.toml]
        additional_dependencies:
          - pydantic>=2.10
          - pydantic-settings>=2.7
          - fastapi>=0.115
          - sqlalchemy>=2.0
          - structlog>=24.4
          - anthropic>=0.52
          - openai>=1.82
          - pgvector>=0.3

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.29.0
    hooks:
      - id: eslint
        files: ^frontend/src/.*\.[tj]s$
        types: [file]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/
        types_or: [typescript, html, scss, json]

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Code brackets  { } -->
  <text x="12" y="40" font-family="monospace" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.85)">{</text>
  <text x="40" y="40" font-family="monospace" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.85)">}</text>
  <!-- Magnifying glass -->
  <circle cx="38" cy="24" r="9" fill="none" stroke="#fff" stroke-width="3"/>
  <line x1="44.5" y1="30.5" x2="52" y2="38" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
</svg>
